<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pendidikan Pegawai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; padding: 25px; color: #334155; }
        .data-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .page-title { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 15px; }
        
        .form-sector { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; }
        .form-group input, .form-group select { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; outline: none; background: white; }
        .form-group input[readonly] { background-color: #e2e8f0; cursor: not-allowed; font-weight: 600; color: #1e3a8a; }
        
        .action-bar { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 14px; top: 13px; color: #94a3b8; }
        .search-input { padding: 10px 14px 10px 40px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; width: 280px; outline: none; }
        .search-input:focus { border-color: #2563eb; }

        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; background-color: #2563eb; color: white; transition: all 0.2s; }
        .btn:hover { background-color: #1d4ed8; }

        .table-responsive { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #1e293b; color: white; padding: 14px; font-weight: 700; font-size: 12px; text-transform: uppercase; }
        td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
        .badge { background:#eff6ff; color:#2563eb; font-weight:700; padding:4px 8px; border-radius:4px; font-size: 12px;}
    </style>
</head>
<body>
    <div class="data-card">
        <h2 class="page-title"><i class="fa-solid fa-graduation-cap" style="color:#2563eb;"></i> Rekaman Riwayat Pendidikan Formal</h2>
        
        <div class="form-sector" id="wrapper-form-input">
            <form id="form-pendidikan" onsubmit="savePendidikan(event)">
                <div class="grid-inputs">
                    <div class="form-group">
                        <label>NIK Karyawan (Ketik & Klik Luar) *</label>
                        <input type="number" id="edu-nik" required onblur="cariNamaPegawaiOtomatis(this.value)" placeholder="Ketik NIK disini...">
                    </div>
                    <div class="form-group">
                        <label>Nama Karyawan (Otomatis)</label>
                        <input type="text" id="edu-nama" readonly placeholder="Terisi otomatis...">
                    </div>
                    <div class="form-group">
                        <label>Jenjang Pendidikan *</label>
                        <select id="edu-jenjang" required>
                            <option value="SD">SD Sederajat</option>
                            <option value="SMP">SMP Sederajat</option>
                            <option value="SMA">SMA/SMK Sederajat</option>
                            <option value="D1">D1</option>
                            <option value="D2">D2</option>
                            <option value="D3">D3</option>
                            <option value="D4">D4</option>
                            <option value="S1">S1 (Sarjana)</option>
                            <option value="S2">S2 (Magister)</option>
                            <option value="S3">S3 (Doktor)</option>
                            <option value="Profesi">Profesi / Spesialis</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nama Universitas/Sekolah *</label>
                        <input type="text" id="edu-institusi" required placeholder="Contoh: Universitas Indonesia">
                    </div>
                    <div class="form-group">
                        <label>Fakultas / Program Studi</label>
                        <input type="text" id="edu-studi" placeholder="Opsional">
                    </div>
                    <div class="form-group">
                        <label>Tahun Lulus *</label>
                        <input type="number" id="edu-tahun" required placeholder="Contoh: 2024">
                    </div>
                    <div class="form-group">
                        <label>Nomor Ijazah</label>
                        <input type="text" id="edu-ijazah" placeholder="Opsional">
                    </div>
                </div>
                <input type="hidden" id="edu-id-pegawai">
                <div style="margin-top:20px; text-align:right;">
                    <button type="submit" class="btn" id="btn-simpan">💾 Simpan Riwayat Pendidikan</button>
                </div>
            </form>
        </div>

        <div class="action-bar">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="input-cari" class="search-input" placeholder="Cari Nama Pegawai atau NIK...">
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr><th>NIK</th><th>Nama Karyawan</th><th>Jenjang</th><th>Institusi Pendidikan</th><th>Fakultas / Prodi</th><th>Tahun Lulus</th><th>No Ijazah</th></tr>
                </thead>
                <tbody id="body-tabel-pendidikan">
                    <tr><td colspan="7" style="text-align:center; padding:20px;">Memuat data sinkronisasi...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px; align-items:center;">
            <p id="pagination-info" style="font-size:13px; color:#64748b;"></p>
            <div style="display:flex; gap:6px;">
                <button class="btn" id="btn-prev" style="background:white; border:1px solid #cbd5e1; color:#334155; padding:6px 12px;">Sebelumnya</button>
                <button class="btn" id="btn-next" style="background:white; border:1px solid #cbd5e1; color:#334155; padding:6px 12px;">Selanjutnya</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "URL_SUPABASE_ANDA";
        const SUPABASE_KEY = "KEY_SUPABASE_ANDA";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        if (sessionStorage.getItem('role') !== 'superadmin') {
            document.getElementById('wrapper-form-input').style.display = 'none';
        }

        let rawData = [], filteredData = [], currentPage = 1, rowsPerPage = 20;

        async function cariNamaPegawaiOtomatis(nik) {
            if(!nik) return;
            const { data } = await supabaseClient.from('pegawai').select('id_pegawai, nama').eq('nik', nik.trim()).single();
            if(data) {
                document.getElementById('edu-nama').value = data.nama;
                document.getElementById('edu-id-pegawai').value = data.id_pegawai;
            } else {
                alert("NIK tidak ditemukan di pangkalan data induk!");
                document.getElementById('edu-nik').value = ""; document.getElementById('edu-nama').value = "";
            }
        }

        async function muatPendidikan() {
            const { data } = await supabaseClient.from('riwayat_pendidikan').select('*').order('tahun_lulus', { ascending: false });
            rawData = data || []; jalankanFilter();
        }

        function jalankanFilter() {
            const keyword = document.getElementById('input-cari').value.toLowerCase().trim();
            filteredData = rawData.filter(r => (r.nama_pegawai?.toLowerCase().includes(keyword)) || (r.nik?.includes(keyword)));
            currentPage = 1; renderTabel();
        }

        function renderTabel() {
            const tbody = document.getElementById('body-tabel-pendidikan'); tbody.innerHTML = "";
            const total = filteredData.length;

            if(total === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px; color:#64748b;">Belum ada riwayat tercatat.</td></tr>`;
                document.getElementById('pagination-info').textContent = "Menampilkan 0 dari 0 catatan"; return;
            }

            const start = (currentPage - 1) * rowsPerPage;
            filteredData.slice(start, start + rowsPerPage).forEach(r => {
                tbody.innerHTML += `<tr>
                    <td>${r.nik}</td>
                    <td style="font-weight:700; color:#1e3a8a;">${r.nama_pegawai}</td>
                    <td><span class="badge">${r.jenjang_pendidikan}</span></td>
                    <td>${r.nama_institusi}</td>
                    <td>${r.fakultas_jurusan || '-'}</td>
                    <td><strong>${r.tahun_lulus}</strong></td>
                    <td>${r.no_ijazah || '-'}</td>
                </tr>`;
            });
            document.getElementById('pagination-info').textContent = `Menampilkan ${start + 1}-${Math.min(start + rowsPerPage, total)} dari ${total} catatan`;
        }

        document.getElementById('input-cari').oninput = jalankanFilter;
        document.getElementById('btn-prev').onclick = () => { if(currentPage > 1) { currentPage--; renderTabel(); } };
        document.getElementById('btn-next').onclick = () => { if(currentPage < Math.ceil(filteredData.length / rowsPerPage)) { currentPage++; renderTabel(); } };

        async function savePendidikan(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-simpan');
            btn.innerHTML = "Menyimpan..."; btn.disabled = true;

            const payload = {
                id_pendidikan: 'EDU-' + Date.now(),
                id_pegawai: document.getElementById('edu-id-pegawai').value,
                nik: document.getElementById('edu-nik').value.trim(),
                nama_pegawai: document.getElementById('edu-nama').value,
                jenjang_pendidikan: document.getElementById('edu-jenjang').value,
                nama_institusi: document.getElementById('edu-institusi').value.trim(),
                fakultas_jurusan: document.getElementById('edu-studi').value.trim(),
                tahun_lulus: document.getElementById('edu-tahun').value.trim(),
                no_ijazah: document.getElementById('edu-ijazah').value.trim()
            };

            const { error } = await supabaseClient.from('riwayat_pendidikan').insert([payload]);
            if (!error) { alert("Sukses!"); document.getElementById('form-pendidikan').reset(); muatPendidikan(); }
            else { alert("Gagal."); }
            btn.innerHTML = "💾 Simpan Riwayat Pendidikan"; btn.disabled = false;
        }

        document.addEventListener('DOMContentLoaded', muatPendidikan);
    </script>
</body>
</html>
