<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Input Izin Kerja & STR Karyawan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-light: #f8fafc;
            --dark-slate: #0f172a;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: #334155; padding: 40px 20px; display: flex; justify-content: center; }

        .container { width: 100%; max-width: 900px; }
        .panel-form-box { background: white; border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        .page-header { margin-bottom: 25px; border-bottom: 2px solid var(--bg-light); padding-bottom: 15px; }
        .page-header h2 { font-size: 20px; font-weight: 800; color: var(--dark-slate); display: flex; align-items: center; gap: 10px; }
        .page-header h2 i { color: var(--primary); }
        .page-header p { font-size: 13px; color: #64748b; margin-top: 4px; }

        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: span 3; }
        .form-group label { font-size: 12px; font-weight: 700; color: #475569; }
        
        /* Gaya khusus untuk kolom NIK yang memiliki tombol cek */
        .nik-search-box { display: flex; gap: 8px; }
        .nik-search-box input { flex: 1; }
        
        .form-group input, .form-group select { padding: 11px 14px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; outline: none; background: #f8fafc; transition: all 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .form-group input[readonly] { background-color: #e2e8f0; color: #475569; cursor: not-allowed; font-weight: 600; }
        
        .btn { padding: 11px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; text-decoration: none; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-dark); }
        .btn-secondary { background-color: #64748b; color: white; }
        .btn-secondary:hover { background-color: #475569; }

        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-top: 5px; }
        .badge-success { background: #dcfce7; color: #15803d; }
        .badge-error { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

    <div class="container">

        <div class="panel-form-box">
            <div class="page-header">
                <h2><i class="fa-solid fa-id-card"></i> Formulir Registrasi STR Baru</h2>
                <p>Masukkan NIK pegawai, sistem akan otomatis mencocokkan data ke database induk admin.</p>
            </div>
            
            <form id="form-add-str" onsubmit="saveDataIzinKerja(event, 'berkas_str', 'form-add-str')">
                <div class="grid-inputs">
                    <div class="form-group">
                        <label>NIK Pegawai (Tekan Enter/Cek)</label>
                        <div class="nik-search-box">
                            <input type="number" name="nik" id="str-nik" placeholder="Masukkan NIK Karyawan" required onchange="cariDataPegawaiByNIK('str-nik', 'str-nama')">
                            <button type="button" class="btn btn-secondary" style="padding: 0 12px;" onclick="cariDataPegawaiByNIK('str-nik', 'str-nama')"><i class="fa-solid fa-magnifying-glass"></i></button>
                        </div>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Nama Lengkap Karyawan (Otomatis Terisi)</label>
                        <input type="text" name="nama" id="str-nama" readonly placeholder="Ketik NIK terlebih dahulu untuk memunculkan nama" required>
                    </div>
                    <div class="form-group">
                        <label>Bidang Profesi</label>
                        <input type="text" name="bidang" placeholder="Contoh: Perawat, Dokter" required>
                    </div>
                    <div class="form-group">
                        <label>Nomor STR</label>
                        <input type="text" name="no_str" required>
                    </div>
                    <div class="form-group">
                        <label>Tanggal Terbit STR</label>
                        <input type="date" name="tgl_terbit" required>
                    </div>
                    <div class="form-group">
                        <label>Tanggal Berakhir STR</label>
                        <input type="date" name="tgl_berakhir" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Unggah Berkas Lampiran STR (PDF/Gambar)</label>
                        <input type="file" name="lampiran_file" accept=".pdf, .png, .jpg, .jpeg" required>
                    </div>
                </div>
                <div style="margin-top: 25px; text-align: right;">
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Simpan Berkas STR</button>
                </div>
            </form>
        </div>


        <div class="panel-form-box">
            <div class="page-header">
                <h2><i class="fa-solid fa-file-signature"></i> Formulir Registrasi SIK / SIP Baru</h2>
                <p>Masukkan NIK pegawai, sistem akan otomatis menyinkronkan data nama dari database kepegawaian.</p>
            </div>
            
            <form id="form-add-sik" onsubmit="saveDataIzinKerja(event, 'berkas_sik', 'form-add-sik')">
                <div class="grid-inputs">
                    <div class="form-group">
                        <label>NIK Pegawai (Tekan Enter/Cek)</label>
                        <div class="nik-search-box">
                            <input type="number" name="nik" id="sik-nik" placeholder="Masukkan NIK Karyawan" required onchange="cariDataPegawaiByNIK('sik-nik', 'sik-nama')">
                            <button type="button" class="btn btn-secondary" style="padding: 0 12px;" onclick="cariDataPegawaiByNIK('sik-nik', 'sik-nama')"><i class="fa-solid fa-magnifying-glass"></i></button>
                        </div>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Nama Lengkap Karyawan (Otomatis Terisi)</label>
                        <input type="text" name="nama" id="sik-nama" readonly placeholder="Ketik NIK terlebih dahulu untuk memunculkan nama" required>
                    </div>
                    <div class="form-group">
                        <label>Bidang Profesi / Unit</label>
                        <input type="text" name="bidang" placeholder="Contoh: Bidan, Apoteker" required>
                    </div>
                    <div class="form-group">
                        <label>Nomor SIP / SIK</label>
                        <input type="text" name="no_sip" required>
                    </div>
                    <div class="form-group">
                        <label>Tanggal Terbit SIK</label>
                        <input type="date" name="tgl_terbit" required>
                    </div>
                    <div class="form-group">
                        <label>Tanggal Berakhir SIK</label>
                        <input type="date" name="tgl_berakhir" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Unggah Berkas Lampiran SIK (PDF/Gambar)</label>
                        <input type="file" name="lampiran_file" accept=".pdf, .png, .jpg, .jpeg" required>
                    </div>
                </div>
                <div style="margin-top: 25px; text-align: right;">
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Simpan Berkas SIK</button>
                </div>
            </form>
        </div>

    </div>

    <script>
        // Inisialisasi Klien Supabase Anda
        const SUPABASE_URL = "https://trxakqvaxleslwmngsvr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_fKDMGUajM2z2CbLVk2DuGg_8mSdHQoC";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 🔍 1. FUNGSI SMART PENCARIAN NIK KE TABEL PEGAWAI (INDUK DATA ADMIN)
        async function cariDataPegawaiByNIK(idInputNIK, idInputNama) {
            const nikValue = document.getElementById(idInputNIK).value.trim();
            const namaField = document.getElementById(idInputNama);

            if (!nikValue) return;

            namaField.value = "Sedang mencari data NIK...";

            try {
                // Mencari nama ke tabel 'pegawai' berdasarkan nik yang diinputkan
                const { data, error } = await supabaseClient
                    .from('pegawai')
                    .select('nama')
                    .eq('nik', nikValue)
                    .maybeSingle(); // Mengambil satu data saja jika cocok

                if (error) throw error;

                if (data) {
                    namaField.value = data.nama; // Masukkan nama otomatis jika ketemu
                    namaField.style.color = "#1e3a8a";
                } else {
                    namaField.value = "";
                    alert(`⚠️ NIK [${nikValue}] tidak terdaftar di database induk admin kepegawaian. Pastikan NIK sudah benar.`);
                }
            } catch (err) {
                console.error("Gagal verifikasi NIK:", err);
                namaField.value = "";
                alert("Gagal menghubungkan ke server untuk pengecekan NIK.");
            }
        }

        // 🚀 2. FUNGSI UPLOAD FILE & SIMPAN DATA SELESAI AUTO-FILL
        async function saveDataIzinKerja(event, namaTabel, idForm) {
            event.preventDefault();
            const form = document.getElementById(idForm);
            const btnSubmit = form.querySelector('button[type="submit"]');
            
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Memproses Berkas...";

            const fileInput = form.querySelector('input[type="file"]');
            let finalUrl = "";

            try {
                // Proses upload otomatis ke Storage Bucket bernama 'lampiran'
                if (fileInput && fileInput.files.length > 0) {
                    const fileObj = fileInput.files[0];
                    const fileExt = fileObj.name.split('.').pop();
                    const fileName = `${namaTabel}_${Date.now()}.${fileExt}`;
                    
                    const { data: uploadData, error: uploadError } = await supabaseClient
                        .storage
                        .from('lampiran')
                        .upload(fileName, fileObj);

                    if (uploadError) throw uploadError;

                    const { data: publicUrlData } = supabaseClient
                        .storage
                        .from('lampiran')
                        .getPublicUrl(fileName);
                        
                    finalUrl = publicUrlData.publicUrl;
                }

                // Ambil semua data inputan form
                const formData = new FormData(form);
                const dataObj = {};
                formData.forEach((value, key) => { 
                    if (key !== 'lampiran_file') { dataObj[key] = value.trim(); } 
                });

                // Pasangkan URL hasil upload otomatis
                dataObj['lampiran_url'] = finalUrl;

                // Kirim objek data final ke Supabase
                const { error: insertError } = await supabaseClient.from(namaTabel).insert([dataObj]);
                if (insertError) throw insertError;

                alert(`Sukses! Berkas ${namaTabel.replace('_', ' ').toUpperCase()} berhasil disimpan & terkoneksi dengan NIK.`);
                form.reset();
                
            } catch (err) {
                console.error("Sistem gagal:", err);
                alert("Gagal merekam berkas. Pastikan ukuran file kecil dan hak akses Policy Storage sudah bernilai Public.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "<i class='fa-solid fa-floppy-disk'></i> Simpan Berkas";
            }
        }
    </script>
</body>
</html>
