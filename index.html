<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Dashboard Kepegawaian</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; height: 100vh; background: #f1f5f9; }
        .sidebar { width: 260px; background: #1e293b; color: white; padding: 20px; display: flex; flex-direction: column; }
        .menu { padding: 12px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 10px; border-radius: 6px; transition: 0.2s; }
        .menu:hover { background: #334155; color: white; }
        .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; }
        .logout { margin-top: auto; color: #ef4444; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="margin-bottom:20px; font-size:18px;">Sinergi Admin</h2>
        <div class="menu" onclick="document.getElementById('frame').src='daftar-pegawai.html'"><i class="fa-solid fa-users"></i> Daftar Pegawai</div>
        <div class="menu" onclick="document.getElementById('frame').src='riwayat-pangkat.html'"><i class="fa-solid fa-star"></i> Riwayat Pangkat</div>
        <div class="menu" onclick="document.getElementById('frame').src='riwayat-jabatan.html'"><i class="fa-solid fa-briefcase"></i> Riwayat Jabatan</div>
        <div class="menu" onclick="document.getElementById('frame').src='riwayat-pendidikan.html'"><i class="fa-solid fa-graduation-cap"></i> Riwayat Pendidikan</div>
        <div class="menu" onclick="document.getElementById('frame').src='data-keluarga.html'"><i class="fa-solid fa-people-roof"></i> Data Keluarga</div>
        <div class="menu logout" onclick="sessionStorage.clear(); location.href='login.html'"><i class="fa-solid fa-power-off"></i> Logout</div>
    </div>
    <div class="main">
        <iframe id="frame" src="daftar-pegawai.html"></iframe>
    </div>
</body>
</html>
