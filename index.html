        .menu-item { display: block; }

        .menu-link:hover, .menu-item.active > .menu-link { color: white; background-color: #334155; }

        .submenu-link:hover, .submenu-link.active { color: white; background-color: transparent; }

        /* MAIN CONTENT AREA */
        .main-wrapper { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); display: flex; flex-direction: column; min-height: 100vh; }

        /* TOP NAV BAR */
        .top-nav { height: 70px; background-color: white; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; position: sticky; top: 0; z-index: 90; }
        .user-profile-box { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 38px; height: 38px; background-color: var(--primary-light); color: var(--primary); font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .user-info h4 { font-size: 14px; font-weight: 700; color: var(--dark-slate); }
        .user-info p { font-size: 12px; color: #64748b; }

        /* CONTENT BODY - FIXED IFRAME CONTAINER */
        .content-body { flex: 1; position: relative; background: var(--bg-light); padding: 0; overflow: hidden; }
        iframe { width: 100%; height: calc(100vh - 70px); border: none; background: var(--bg-light); }

        .btn { padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-danger { background-color: #dc2626; color: white; }
        .btn-danger:hover { background-color: #b91c1c; }

        .btn-action { padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; color: white; margin-right: 4px; display: inline-flex; align-items: center; gap: 4px; }
        /* MODAL VIEW DETAIL STYLE */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.3s ease; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-container { background: white; width: 90%; max-width: 950px; max-height: 85vh; border-radius: 14px; overflow-y: auto; padding: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); transform: translateY(-20px); transition: all 0.3s ease; }
        .modal-overlay.open .modal-container { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; }
        .modal-header h3 { font-size: 18px; font-weight: 800; color: var(--dark-slate); }
        .modal-close-btn { background: none; border: none; font-size: 20px; color: #94a3b8; cursor: pointer; transition: color 0.2s; }
        .modal-close-btn:hover { color: #64748b; }
        .view-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .view-row { display: flex; justify-content: space-between; padding: 10px 12px; background: #f8fafc; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 13px; }
        .view-row strong { color: #475569; text-transform: uppercase; font-size: 11px; }
        .view-row span { font-weight: 600; color: var(--dark-slate); }
    </style>
</head>
