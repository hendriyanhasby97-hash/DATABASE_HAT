<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Anggota Keluarga Karyawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; padding: 25px; color: #334155; }
        .data-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; }
        .form-sector { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; }
        .form-group input, .form-group select { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; }
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; background: #2563eb; color: white; border:none; cursor:pointer;}
        .table-responsive { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 15px;}
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #1e293b; color: white; padding: 14px; font-size: 12px; }
        td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="data-card">
        <h2 style="font-size:20px; font-weight:800; margin-bottom:15px;">Susunan Silsilah Anggota Keluarga Karyawan</h2>
        <div class="form-sector" id="wrapper-form-input">
            <form id="form-keluarga" onsubmit="saveKeluarga(event)">
                <div class="grid-inputs">
                    <div class="form-group"><label>NIK Utama Pegawai</label><input type="number" id="fam-nik-utama" required onblur="cariNamaPegawaiOtomatis(this.value)"></div>
                    <div class="form-group"><label>Nama Pegawai Induk</label><input type="text" id="fam-nama-utama" readonly style="background:#e2e8f0;"></div>
                    <div class="form-group"><label>Nama Lengkap Anggota Keluarga</label><input type="text" id="fam-nama" required></div>
                    <div class="form-group"><label>NIK Anggota Keluarga</label><input type="number" id="fam-nik-anggota" required></div>
                    <div class="form-group"><label>Hubungan Kekeluargaan</label><select id="fam-hubungan"><option>Istri</option><option>Suami</option><option>Anak</option></select></div>
                    <div class="form-group"><label>Tanggal Lahir Anggota</label><input type="date" id="fam-tgl" required></div>
                </div>
                <input type="hidden" id="fam-id-pegawai">
                <div style="margin-top:15px; text-align:right;"><button type="submit" class="btn">💾 Rekam Anggota Keluarga</button></div>
            </form>
        </div>
        <div class="table-responsive">
            <table>
                <thead><tr><th>Nama Pegawai Induk</th><th>Nama Anggota</th><th>NIK Anggota</th><th>Hubungan Status</th><th>Tanggal Lahir</th></tr></thead>
                <tbody id="body-tabel-keluarga"></tbody>
            </table>
        </div>
    </div>
    <script>
        const supabaseClient = supabase.createClient("https://trxakqvaxleslwmngsvr.supabase.co", "sb_publishable_fKDMGUajM2z2CbLVk2DuGg_8mSdHQoC");
        if (sessionStorage.getItem('role') !== 'superadmin') document.getElementById('wrapper-form-input').style.display = 'none';
        let rawData = [];
        async function cariNamaPegawaiOtomatis(nik) {
            const { data } = await supabaseClient.from('pegawai').select('id_pegawai, nama').eq('nik', nik.trim()).single();
            if(data) { document.getElementById('fam-nama-utama').value = data.nama; document.getElementById('fam-id-pegawai').value = data.id_pegawai; }
        }
        async function muatKeluarga() {
            const { data } = await supabaseClient.from('data_keluarga').select('*'); rawData = data || []; renderTabel();
        }
        function renderTabel() {
            const tbody = document.getElementById('body-tabel-keluarga'); tbody.innerHTML = "";
            rawData.forEach(r => { tbody.innerHTML += `<tr><td><strong>${r.nama_pegawai}</strong></td><td>${r.nama_anggota}</td><td>${r.nik_anggota}</td><td><span style="background:#eff6ff; color:#2563eb; padding:2px 6px; border-radius:4px; font-weight:700;">${r.hubungan}</span></td><td>${r.tanggal_lahir}</td></tr>`; });
        }
        async function saveKeluarga(event) {
            event.preventDefault();
            const payload = {
                id_keluarga: 'FAM-' + Date.now(), id_pegawai: document.getElementById('fam-id-pegawai').value,
                nik_pegawai: document.getElementById('fam-nik-utama').value.trim(), nama_pegawai: document.getElementById('fam-nama-utama').value,
                nama_anggota: document.getElementById('fam-nama').value.trim(), nik_anggota: document.getElementById('fam-nik-anggota').value.trim(),
                hubungan: document.getElementById('fam-hubungan').value, tanggal_lahir: document.getElementById('fam-tgl').value
            };
            await supabaseClient.from('data_keluarga').insert([payload]); alert("Keluarga Tercatat!"); document.getElementById('form-keluarga').reset(); muatKeluarga();
        }
        document.addEventListener('DOMContentLoaded', muatKeluarga);
    </script>
</body>
</html>
