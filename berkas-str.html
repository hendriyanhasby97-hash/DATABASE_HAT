<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi STR Karyawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; padding: 25px; }
        .data-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; }
        .form-sector { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; }
        .form-group input { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; outline: none; }
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; background: #2563eb; color: white; }
        .table-responsive { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #1e293b; color: white; padding: 14px; font-size: 12px; text-transform: uppercase; }
        td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="data-card">
        <h2 style="font-size:20px; font-weight:800; margin-bottom:15px;">Registrasi Surat Tanda Registrasi (STR)</h2>
        
        <div class="form-sector">
            <form id="form-add-str" onsubmit="saveDataSTRAdmin(event)">
                <div class="grid-inputs">
                    <div class="form-group"><label>NIK</label><input type="number" id="str-nik" required></div>
                    <div class="form-group"><label>Nama</label><input type="text" id="str-nama" required></div>
                    <div class="form-group"><label>Bidang</label><input type="text" id="str-bidang" required></div>
                    <div class="form-group"><label>No STR</label><input type="text" id="str-no" required></div>
                    <div class="form-group"><label>Tgl Terbit</label><input type="date" id="str-terbit" required></div>
                    <div class="form-group">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2px;">
                            <label>Tgl Berakhir STR</label>
                            <label style="font-size:11px; font-weight:700; color:#2563eb; display:inline-flex; align-items:center; gap:4px; cursor:pointer; text-transform:none;">
                                <input type="checkbox" id="admin-str-seumur-hidup" onchange="toggleSeumurHidup()"> Seumur Hidup
                            </label>
                        </div>
                        <input type="date" id="str-berakhir" required>
                    </div>
                    <div class="form-group" style="grid-column: span 3;"><label>File Lampiran Berkas</label><input type="file" id="str-file" required></div>
                </div>
                <div style="margin-top:15px; text-align:right;"><button type="submit" class="btn">💾 Unggah Berkas STR</button></div>
            </form>
        </div>

        <div class="table-responsive">
            <table>
                <thead><tr><th>NIK</th><th>Nama Pegawai</th><th>Bidang Profesi</th><th>No. STR</th><th>Tgl Terbit</th><th>Tgl Berakhir</th><th>Lampiran</th></tr></thead>
                <tbody id="body-tabel-str"></tbody>
            </table>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://trxakqvaxleslwmngsvr.supabase.co", "sb_publishable_fKDMGUajM2z2CbLVk2DuGg_8mSdHQoC");
        
        function toggleSeumurHidup() {
            const cb = document.getElementById('admin-str-seumur-hidup');
            const tgl = document.getElementById('str-berakhir');
            if(cb.checked) { tgl.type = "text"; tgl.value = "Seumur Hidup"; tgl.readOnly = true; tgl.style.backgroundColor = "#e2e8f0"; }
            else { tgl.type = "date"; tgl.value = ""; tgl.readOnly = false; tgl.style.backgroundColor = "#ffffff"; }
        }

        async function muatSTR() {
            const tbody = document.getElementById('body-tabel-str');
            const { data } = await supabaseClient.from('berkas_str').select('*');
            tbody.innerHTML = "";
            if(!data || data.length === 0) return;
            data.forEach(r => {
                tbody.innerHTML += `<tr><td>${r.nik}</td><td><strong>${r.nama}</strong></td><td>${r.bidang}</td><td>${r.no_str}</td><td>${r.tgl_terbit}</td><td><span style="padding:4px 8px; border-radius:4px; font-weight:700; ${r.tgl_berakhir === 'Seumur Hidup' ? 'background:#e0f2fe; color:#0369a1;' : ''}">${r.tgl_berakhir}</span></td><td><a href="${r.lampiran_url || '#'}" target="_blank" style="color:#2563eb;text-decoration:none;"><i class="fa-solid fa-file-pdf"></i> Lihat</a></td></tr>`;
            });
        }

        async function saveDataSTRAdmin(event) {
            event.preventDefault();
            const fileInput = document.getElementById('str-file');
            let finalUrl = "";
            if (fileInput.files.length > 0) {
                const fileObj = fileInput.files[0];
                const fileName = `str_${Date.now()}.${fileObj.name.split('.').pop()}`;
                await supabaseClient.storage.from('lampiran').upload(fileName, fileObj);
                finalUrl = supabaseClient.storage.from('lampiran').getPublicUrl(fileName).data.publicUrl;
            }
            const payload = {
                nik: document.getElementById('str-nik').value.trim(),
                nama: document.getElementById('str-nama').value.trim(),
                bidang: document.getElementById('str-bidang').value.trim(),
                no_str: document.getElementById('str-no').value.trim(),
                tgl_terbit: document.getElementById('str-terbit').value,
                tgl_berakhir: document.getElementById('admin-str-seumur-hidup').checked ? "Seumur Hidup" : document.getElementById('str-berakhir').value,
                lampiran_url: finalUrl
            };
            await supabaseClient.from('berkas_str').insert([payload]);
            alert("STR Berhasil!"); document.getElementById('form-add-str').reset();
            document.getElementById('admin-str-seumur-hidup').checked = false; toggleSeumurHidup(); muatSTR();
        }
        document.addEventListener('DOMContentLoaded', muatSTR);
    </script>
</body>
</html>
