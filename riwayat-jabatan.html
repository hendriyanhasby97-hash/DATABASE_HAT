<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Jabatan Pegawai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; padding: 25px; color: #334155; }
        .data-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .page-title { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 15px; }
        
        .form-sector { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; }
        .form-group input, .form-group select { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; outline: none; background: white; }
        .form-group input[readonly] { background-color: #e2e8f0; cursor: not-allowed; font-weight: 600; color: #1e3a8a; }
        
        .action-bar { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 14px; top: 13px; color: #94a3b8; }
        .search-input { padding: 10px 14px 10px 40px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; width: 280px; outline: none; }
        .search-input:focus { border-color: #2563eb; }

        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; background-color: #2563eb; color: white; transition: all 0.2s; }
        .btn:hover { background-color: #1d4ed8; }

        .table-responsive { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #1e293b; color: white; padding: 14px; font-weight: 700; font-size: 12px; text-transform: uppercase; }
        td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
        .badge { background:#fff7ed; color:#ea580c; font-weight:700; padding:4px 8px; border-radius:4px; font-size: 12px;}
    </style>
</head>
<body>
    <div class="data-card">
        <h2 class="page-title"><i class="fa-solid fa-briefcase" style="color:#2563eb;"></i> Rekaman Riwayat Jabatan</h2>
        
        <div class="form-sector" id="wrapper-form-input">
            <form id="form-jabatan" onsubmit="saveJabatan(event)">
                <div class="grid-inputs">
                    <div class="form-group">
                        <label>NIK Karyawan (Ketik & Klik Luar) *</label>
                        <input type="number" id="jab-nik" required onblur="cariNamaPegawaiOtomatis(this.value)" placeholder="Ketik NIK disini...">
                    </div>
                    <div class="form-group">
                        <label>Nama Karyawan (Otomatis)</label>
                        <input type="text" id="jab-nama" readonly placeholder="Terisi otomatis...">
                    </div>
                    <div class="form-group">
                        <label>Nama Jabatan Baru *</label>
                        <input type="text" id="jab-nama-baru" required placeholder="Contoh: Kepala Instalasi">
                    </div>
                    <div class="form-group">
                        <label>Kelompok Jabatan *</label>
                        <select id="jab-kelompok" required>
                            <option value="Management">Management</option>
                            <option value="Tenaga Medis">Tenaga Medis</option>
                            <option value="Tenaga Kesehatan">Tenaga Kesehatan</option>
                            <option value="Tenaga Penunjang Medis">Tenaga Penunjang Medis</option>
                            <option value="Tenaga Administrasi">Tenaga Administrasi</option>
                            <option value="Tenaga Non Administrasi">Tenaga Non Administrasi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ruangan / Unit Kerja *</label>
                        <input type="text" id="jab-ruangan" required placeholder="Ruangan Tugas">
                    </div>
                    <div class="form-group">
                        <label>TMT Jabatan Baru *</label>
                        <input type="date" id="jab-tmt" required>
                    </div>
                    <div class="form-group">
                        <label>No. SK Jabatan</label>
                        <input type="text" id="jab-sk" placeholder="Nomor Surat Keputusan (Opsional)">
                    </div>
                </div>
                <input type="hidden" id="jab-id-pegawai">
                <div style="margin-top:20px; text-align:right;">
                    <button type="submit" class="btn" id="btn-simpan">💾 Simpan Riwayat Jabatan</button>
                </div>
            </form>
        </div>

        <div class="action-bar">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="input-cari" class="search-input" placeholder="Cari Nama Pegawai atau NIK...">
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr><th>NIK</th><th>Nama Karyawan</th><th>Jabatan Baru</th><th>Kelompok</th><th>Ruangan / Unit</th><th>TMT Jabatan</th><th>No. SK</th></tr>
                </thead>
                <tbody id="body-tabel-jabatan">
                    <tr><td colspan="7" style="text-align:center; padding:20px;">Memuat data sinkronisasi...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px; align-items:center;">
            <p id="pagination-info" style="font-size:13px; color:#64748b;"></p>
            <div style="display:flex; gap:6px;">
                <button class="btn" id="btn-prev" style="background:white; border:1px solid #cbd5e1; color:#334155; padding:6px 12px;">Sebelumnya</button>
                <button class="btn" id="btn-next" style="background:white; border:1px solid #cbd5e1; color:#334155; padding:6px 12px;">Selanjutnya</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "URL_SUPABASE_ANDA";
        const SUPABASE_KEY = "KEY_SUPABASE_ANDA";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        if (sessionStorage.getItem('role') !== 'superadmin') {
            document.getElementById('wrapper-form-input').style.display = 'none';
        }

        let rawData = [], filteredData = [], currentPage = 1, rowsPerPage = 20;

        async function cariNamaPegawaiOtomatis(nik) {
            if(!nik) return;
            const { data } = await supabaseClient.from('pegawai').select('id_pegawai, nama').eq('nik', nik.trim()).single();
            if(data) {
                document.getElementById('jab-nama').value = data.nama;
                document.getElementById('jab-id-pegawai').value = data.id_pegawai;
            } else {
                alert("NIK tidak ditemukan! Pastikan pegawai sudah ada di data induk.");
                document.getElementById('jab-nik').value = ""; document.getElementById('jab-nama').value = "";
            }
        }

        async function muatJabatan() {
            const { data } = await supabaseClient.from('riwayat_jabatan').select('*').order('tmt_jabatan', { ascending: false });
            rawData = data || []; jalankanFilter();
        }

        function jalankanFilter() {
            const keyword = document.getElementById('input-cari').value.toLowerCase().trim();
            filteredData = rawData.filter(r => (r.nama_pegawai?.toLowerCase().includes(keyword)) || (r.nik?.includes(keyword)));
            currentPage = 1; renderTabel();
        }

        function renderTabel() {
            const tbody = document.getElementById('body-tabel-jabatan'); tbody.innerHTML = "";
            const total = filteredData.length;

            if(total === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px; color:#64748b;">Belum ada riwayat tercatat.</td></tr>`;
                document.getElementById('pagination-info').textContent = "Menampilkan 0 dari 0 catatan"; return;
            }

            const start = (currentPage - 1) * rowsPerPage;
            filteredData.slice(start, start + rowsPerPage).forEach(r => {
                tbody.innerHTML += `<tr>
                    <td>${r.nik}</td>
                    <td style="font-weight:700; color:#1e3a8a;">${r.nama_pegawai}</td>
                    <td><strong>${r.nama_jabatan}</strong></td>
                    <td><span class="badge">${r.kelompok_jabatan}</span></td>
                    <td>${r.ruangan_unit}</td>
                    <td>${r.tmt_jabatan}</td>
                    <td>${r.no_sk_jabatan || '-'}</td>
                </tr>`;
            });
            document.getElementById('pagination-info').textContent = `Menampilkan ${start + 1}-${Math.min(start + rowsPerPage, total)} dari ${total} catatan`;
        }

        document.getElementById('input-cari').oninput = jalankanFilter;
        document.getElementById('btn-prev').onclick = () => { if(currentPage > 1) { currentPage--; renderTabel(); } };
        document.getElementById('btn-next').onclick = () => { if(currentPage < Math.ceil(filteredData.length / rowsPerPage)) { currentPage++; renderTabel(); } };

        async function saveJabatan(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-simpan');
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Menyimpan..."; btn.disabled = true;

            const payload = {
                id_jabatan: 'JAB-' + Date.now(),
                id_pegawai: document.getElementById('jab-id-pegawai').value,
                nik: document.getElementById('jab-nik').value.trim(),
                nama_pegawai: document.getElementById('jab-nama').value,
                nama_jabatan: document.getElementById('jab-nama-baru').value.trim(),
                kelompok_jabatan: document.getElementById('jab-kelompok').value,
                ruangan_unit: document.getElementById('jab-ruangan').value.trim(),
                tmt_jabatan: document.getElementById('jab-tmt').value,
                no_sk_jabatan: document.getElementById('jab-sk').value.trim()
            };

            const { error } = await supabaseClient.from('riwayat_jabatan').insert([payload]);
            if (!error) { alert("Sukses merekam jabatan!"); document.getElementById('form-jabatan').reset(); muatJabatan(); } 
            else { alert("Gagal menyimpan ke database cloud."); }
            btn.innerHTML = "💾 Simpan Riwayat Jabatan"; btn.disabled = false;
        }

        document.addEventListener('DOMContentLoaded', muatJabatan);
    </script>
</body>
</html>
