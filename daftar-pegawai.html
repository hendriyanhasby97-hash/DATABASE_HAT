<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Manajemen Data Pegawai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; padding: 25px; color: #334155; }
        .data-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; }
        
        /* TOMBOL TAMBAH */
        .btn-add { background: #2563eb; color: white; padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        
        /* FORM INPUT */
        .panel-form { background: #f1f5f9; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #cbd5e1; }
        .hidden { display: none; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 12px; font-weight: 700; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
    </style>
</head>
<body>

<div class="data-card">
    <h2>Data Pegawai</h2>
    
    <button class="btn-add" onclick="toggleForm()">+ Tambah Pegawai Baru</button>

    <div id="form-input" class="panel-form hidden">
        <h3 style="margin-bottom: 15px;">Input Data Pegawai Baru</h3>
        <form id="pegawai-form" onsubmit="simpanData(event)">
            <div class="grid-3">
                <div class="form-group"><label>NIK</label><input type="number" id="nik" required></div>
                <div class="form-group"><label>Nama Lengkap</label><input type="text" id="nama" required></div>
                <div class="form-group"><label>Status</label><select id="status"><option>Aktif</option><option>Pensiun</option></select></div>
            </div>
            <button type="submit" class="btn-add" style="background:#16a34a;">Simpan Data ke Database</button>
        </form>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
            <thead style="background: #1e293b; color: white;">
                <tr><th style="padding:10px;">NIK</th><th style="padding:10px;">Nama</th><th style="padding:10px;">Status</th></tr>
            </thead>
            <tbody id="tabel-body"></tbody>
        </table>
    </div>
</div>

<script>
    const supabase = supabase.createClient("URL_SUPABASE_ANDA", "KEY_SUPABASE_ANDA");

    // Fungsi buka/tutup form
    function toggleForm() {
        document.getElementById('form-input').classList.toggle('hidden');
    }

    // Fungsi kirim data ke Supabase
    async function simpanData(e) {
        e.preventDefault();
        const data = {
            nik: document.getElementById('nik').value,
            nama: document.getElementById('nama').value,
            status: document.getElementById('status').value,
            id_pegawai: 'PGW-' + Date.now()
        };
        
        const { error } = await supabase.from('pegawai').insert([data]);
        if (error) { alert("Gagal: " + error.message); }
        else { alert("Data berhasil disimpan!"); location.reload(); }
    }

    // Load data otomatis
    async function loadData() {
        const { data } = await supabase.from('pegawai').select('*');
        const tbody = document.getElementById('tabel-body');
        tbody.innerHTML = data.map(p => `<tr><td style="padding:10px; border-bottom:1px solid #ccc;">${p.nik}</td><td style="padding:10px; border-bottom:1px solid #ccc;">${p.nama}</td><td style="padding:10px; border-bottom:1px solid #ccc;">${p.status}</td></tr>`).join('');
    }
    loadData();
</script>

</body>
</html>
