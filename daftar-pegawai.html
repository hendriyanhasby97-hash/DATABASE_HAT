<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
        .modal-content { background:white; width:70%; margin:50px auto; padding:30px; border-radius:10px; }
    </style>
</head>
<body>

    <h2>Daftar Pegawai</h2>
    <table border="1" width="100%">
        <thead><tr><th>NIK</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead>
        <tbody id="table-body"><tr><td colspan="4">Memuat data...</td></tr></tbody>
    </table>
    
    <div style="margin-top:20px;">
        <button onclick="currentPage > 1 ? (currentPage--, renderTable(currentData, 'table-body')) : null">Sebelumnya</button>
        <span id="page-info"></span>
        <button onclick="currentPage < Math.ceil(currentData.length/15) ? (currentPage++, renderTable(currentData, 'table-body')) : null">Selanjutnya</button>
    </div>

    <div id="modal-drh" class="modal">
        <div class="modal-content">
            <button onclick="document.getElementById('modal-drh').style.display='none'">Tutup</button>
            <h1 id="drh-nama"></h1>
            <h3>Riwayat Pendidikan</h3>
            <ul id="drh-pendidikan"></ul>
            <h3>Riwayat Jabatan</h3>
            <ul id="drh-jabatan"></ul>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        async function init() {
            currentData = await fetchData('pegawai', (data) => renderTable(data, 'table-body'));
            renderTable(currentData, 'table-body');
        }
        init();
    </script>
</body>
</html>
