<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangkalan Data Seluruh Karyawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; padding: 25px; color: #334155; }
        .data-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .page-title { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 5px; }
        .page-desc { font-size: 13px; color: #64748b; margin-bottom: 20px; }
        .table-responsive { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #1e293b; color: white; padding: 14px; font-weight: 700; font-size: 12px; text-transform: uppercase; }
        td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div class="data-card">
        <h2 class="page-title">Pangkalan Data Seluruh Karyawan</h2>
        <p class="page-desc">Menampilkan data induk 31 bidang informasi kepegawaian secara penuh.</p>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr><th>NIK</th><th>Nama Pegawai</th><th>Status</th><th>Kelompok</th><th>Jabatan</th><th>Ruangan</th></tr>
                </thead>
                <tbody id="body-tabel-pegawai">
                    <tr><td colspan="6" style="text-align:center; padding:20px;">Memuat data dari cloud...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://trxakqvaxleslwmngsvr.supabase.co", "sb_publishable_fKDMGUajM2z2CbLVk2DuGg_8mSdHQoC");
        
        async function muatDataInduk() {
            const tbody = document.getElementById('body-tabel-pegawai');
            try {
                const { data, error } = await supabaseClient.from('pegawai').select('*');
                if (error) throw error;
                tbody.innerHTML = "";
                if(!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px;">Belum ada data pegawai.</td></tr>`;
                    return;
                }
                data.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight:600;">${p.nik || '-'}</td>
                            <td style="font-weight:700; color:#1e3a8a;">${p.nama || '-'}</td>
                            <td><span style="padding:3px 8px; background:#dcfce7; color:#15803d; border-radius:4px; font-size:12px;">${p.status || '-'}</span></td>
                            <td>${p.kelompok_pegawai || '-'}</td>
                            <td>${p.jabatan || '-'}</td>
                            <td>${p.ruangan || '-'}</td>
                        </tr>`;
                });
            } catch (e) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red; padding:20px;">Gagal memuat data.</td></tr>`; }
        }
        document.addEventListener('DOMContentLoaded', muatDataInduk);
    </script>
</body>
</html>
