<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Terpusat Supabase</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary: #1e40af; --primary-hover: #1d4ed8; --bg: #f1f5f9; --text: #0f172a; --border: #cbd5e1; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 32px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .login-title { font-size: 20px; font-weight: 800; text-align: center; color: var(--primary); margin-bottom: 6px; }
        .login-sub { font-size: 13px; text-align: center; color: #64748b; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .form-group label { font-size: 12px; font-weight: 700; color: #475569; }
        .form-group input { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
        .btn-login { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 8px; }
        .btn-login:disabled { background: #94a3b8; }
        .info-box { background: #f8fafc; border: 1px dashed var(--border); padding: 12px; border-radius: 6px; margin-top: 16px; font-size: 12px; color: #475569; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-title">Sistem Informasi Pegawai</div>
    <div class="login-sub" style="font-weight: bold; color:green">Koneksi Database Instan Supabase</div>
    
    <form id="login-form">
        <div class="form-group">
            <label>Username / NIK</label>
            <input type="text" id="username" placeholder="Masukkan admin atau NIK Anda" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" id="submit-btn" class="btn-login">Masuk ke Sistem</button>
    </form>

    <div class="info-box">
        <strong>Akses Sistem Live:</strong><br>
        • Admin: User <code style="color:red">admin</code> | Pass <code style="color:red">admin</code><br>
        • Pegawai: Masukkan <code style="color:blue">NIK Anda</code> | Pass Default <code style="color:blue">Masuk123</code>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://trxakqvaxleslwmngsvr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_fKDMGUajM2z2CbLVk2DuGg_8mSdHQoC";
    
    // Inisialisasi client global menggunakan objek 'supabase' dari CDN
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-form').onsubmit = async function(e) {
        e.preventDefault();
        const userIn = document.getElementById('username').value.trim();
        const passIn = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');

        btn.disabled = true;
        btn.textContent = "Memverifikasi...";

        if (userIn === 'admin' && passIn === 'admin') {
            sessionStorage.setItem('role', 'admin');
            sessionStorage.setItem('user_key', 'admin');
            alert('Login berhasil sebagai Admin!');
            window.location.href = 'index.html';
            return;
        }

        try {
            const { data, error } = await supabaseClient.from('pegawai').select('*').eq('nik', userIn);
            
            if (error) throw error;

            if (data && data.length > 0 && passIn === 'Masuk123') {
                const ketemuPegawai = data[0];
                sessionStorage.setItem('role', 'pegawai');
                sessionStorage.setItem('user_key', ketemuPegawai.id_pegawai);
                alert(`Login Berhasil!\nSelamat datang, ${ketemuPegawai.nama}`);
                window.location.href = 'index.html';
            } else {
                alert('Username (NIK) tidak ditemukan atau password salah!');
            }
        } catch (error) {
            console.error(error);
            alert('Gagal login: Periksa koneksi internet atau token API Supabase Anda.');
        } finally {
            btn.disabled = false;
            btn.textContent = "Masuk ke Sistem";
        }
    };
</script>

</body>
</html>
