<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pangkat Pegawai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; padding: 25px; color: #334155; }
        .data-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .page-title { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 15px; }
        
        .form-sector { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; }
        .form-group input, .form-group select { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; outline: none; background: white; }
        .form-group input[readonly] { background-color: #e2e8f0; cursor: not-allowed; font-weight: 600; color: #1e3a8a; }
        
        .action-bar { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 14px; top: 13px; color: #94a3b8; }
        .search-input { padding: 10px 14px 10px 40px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; width: 280px; outline: none; }
        .search-input:focus { border-color: #2563eb; }

        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; background-color: #2563eb; color: white; transition: all 0.2s; }
        .btn:hover { background-color: #1d4ed8; }

        .table-responsive { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #1e293b; color: white; padding: 14px; font-weight: 700; font-size: 12px; text-transform: uppercase; }
        td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
        .badge { background:#f0fdf4; color:#16a34a; font-weight:700; padding:4px 8px; border-radius:4px; font-size: 12px;}
    </style>
</head>
<body>
    <div class="data-card">
        <h2 class="page-title"><i class="fa-solid fa-star" style="color:#2563eb;"></i> Rekaman Riwayat Pangkat & Golongan</h2>
        
        <div class="form-sector" id="wrapper-form-input">
            <form id="form-pangkat" onsubmit="savePangkat(event)">
                <div class="grid-inputs">
                    <div class="form-group">
                        <label>NIK Karyawan (Ketik & Pindah Kolom) *</label>
                        <input type="number" id="pangkat-nik" required onblur="cariNamaPegawaiOtomatis(this.value)" placeholder="Ketik NIK disini...">
                    </div>
                    <div class="form-group">
                        <label>Nama Karyawan (Otomatis)</label>
                        <input type="text" id="pangkat-nama" readonly placeholder="Terisi otomatis dari database induk...">
                    </div>
                    <div class="form-group">
                        <label>Golongan / Ruang *</label>
                        <input type="text" id="pangkat-gol" required placeholder="Contoh: III/b">
                    </div>
                    <div class="form-group">
                        <label>TMT Pangkat Baru *</label>
                        <input type="date" id="pangkat-tmt" required>
                    </div>
                    <div class="form-group">
                        <label>Nomor SK Pangkat *</label>
                        <input type="text" id="pangkat-sk" required placeholder="Nomor Surat Keputusan">
                    </div>
                    <div class="form-group">
                        <label>Tanggal SK Terbit *</label>
                        <input type="date" id="pangkat-tgl-sk" required>
                    </div>
                </div>
                <input type="hidden" id="pangkat-id-pegawai">
                <div style="margin-top:20px; text-align:right;">
                    <button type="submit" class="btn" id="btn-simpan">💾 Simpan Riwayat Pangkat</button>
                </div>
            </form>
        </div>

        <div class="action-bar">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="input-cari" class="search-input" placeholder="Cari Nama Pegawai atau NIK...">
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr><th>NIK</th><th>Nama Karyawan</th><th>Golongan / Ruang</th><th>TMT Pangkat</th><th>No. SK Terbit</th><th>Tanggal SK</th></tr>
                </thead>
                <tbody id="body-tabel-pangkat">
                    <tr><td colspan="6" style="text-align:center; padding:20px;">Memuat data sinkronisasi...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px; align-items:center;">
            <p id="pagination-info" style="font-size:13px; color:#64748b;"></p>
            <div style="display:flex; gap:6px;">
                <button class="btn" id="btn-prev" style="background:white; border:1px solid #cbd5e1; color:#334155; padding:6px 12px;">Sebelumnya</button>
                <button class="btn" id="btn-next" style="background:white; border:1px solid #cbd5e1; color:#334155; padding:6px 12px;">Selanjutnya</button>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Supabase
        const SUPABASE_URL = "URL_SUPABASE_ANDA";
        const SUPABASE_KEY = "KEY_SUPABASE_ANDA";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Security Guard Otoritas
        const roleSekarang = sessionStorage.getItem('role');
        if (roleSekarang !== 'superadmin') {
            document.getElementById('wrapper-form-input').style.display = 'none';
        }

        let rawData = [];
        let filteredData = [];
        let currentPage = 1;
        const rowsPerPage = 20;

        // Auto-Fill Nama dari Database Induk Pegawai
        async function cariNamaPegawaiOtomatis(nik) {
            if(!nik) return;
            const { data, error } = await supabaseClient.from('pegawai').select('id_pegawai, nama').eq('nik', nik.trim()).single();
            if(data) {
                document.getElementById('pangkat-nama').value = data.nama;
                document.getElementById('pangkat-id-pegawai').value = data.id_pegawai;
            } else {
                alert("NIK tidak ditemukan di pangkalan data induk! Pastikan pegawai sudah didaftarkan terlebih dahulu.");
                document.getElementById('pangkat-nik').value = "";
                document.getElementById('pangkat-nama').value = "";
            }
        }

        // Muat Data Tabel
        async function muatPangkat() {
            const { data } = await supabaseClient.from('riwayat_pangkat').select('*').order('tmt_pangkat', { ascending: false });
            rawData = data || [];
            jalankanFilter();
        }

        // Engine Filter Live
        function jalankanFilter() {
            const keyword = document.getElementById('input-cari').value.toLowerCase().trim();
            filteredData = rawData.filter(r => (r.nama_pegawai?.toLowerCase().includes(keyword)) || (r.nik?.includes(keyword)));
            currentPage = 1; 
            renderTabel();
        }

        // Render Tabel 20 Baris
        function renderTabel() {
            const tbody = document.getElementById('body-tabel-pangkat');
            tbody.innerHTML = "";
            const total = filteredData.length;

            if(total === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px; color:#64748b;">Belum ada riwayat tercatat.</td></tr>`;
                document.getElementById('pagination-info').textContent = "Menampilkan 0 dari 0 catatan";
                return;
            }

            const start = (currentPage - 1) * rowsPerPage;
            const dataHalaman = filteredData.slice(start, start + rowsPerPage);

            dataHalaman.forEach(r => {
                tbody.innerHTML += `
                    <tr>
                        <td>${r.nik}</td>
                        <td style="font-weight:700; color:#1e3a8a;">${r.nama_pegawai}</td>
                        <td><span class="badge">${r.golongan_ruang}</span></td>
                        <td>${r.tmt_pangkat}</td>
                        <td>${r.no_sk}</td>
                        <td>${r.tgl_sk}</td>
                    </tr>
                `;
            });

            document.getElementById('pagination-info').textContent = `Menampilkan ${start + 1}-${Math.min(start + rowsPerPage, total)} dari ${total} catatan pangkat`;
        }

        // Listener Navigasi & Pencarian
        document.getElementById('input-cari').oninput = jalankanFilter;
        document.getElementById('btn-prev').onclick = () => { if(currentPage > 1) { currentPage--; renderTabel(); } };
        document.getElementById('btn-next').onclick = () => { if(currentPage < Math.ceil(filteredData.length / rowsPerPage)) { currentPage++; renderTabel(); } };

        // Proses Simpan Data
        async function savePangkat(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-simpan');
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Menyimpan...";
            btn.disabled = true;

            const payload = {
                id_pangkat: 'PKT-' + Date.now(),
                id_pegawai: document.getElementById('pangkat-id-pegawai').value,
                nik: document.getElementById('pangkat-nik').value.trim(),
                nama_pegawai: document.getElementById('pangkat-nama').value,
                golongan_ruang: document.getElementById('pangkat-gol').value.trim(),
                tmt_pangkat: document.getElementById('pangkat-tmt').value,
                no_sk: document.getElementById('pangkat-sk').value.trim(),
                tgl_sk: document.getElementById('pangkat-tgl-sk').value
            };

            const { error } = await supabaseClient.from('riwayat_pangkat').insert([payload]);
            if (!error) { 
                alert("Sukses! Riwayat Pangkat Karyawan Berhasil Direkam."); 
                document.getElementById('form-pangkat').reset(); 
                muatPangkat(); 
            } else {
                alert("Gagal menyimpan data ke database cloud.");
            }
            btn.innerHTML = "💾 Simpan Riwayat Pangkat";
            btn.disabled = false;
        }

        // Inisialisasi Pertama Kali
        document.addEventListener('DOMContentLoaded', muatPangkat);
    </script>
</body>
</html>
